name: Release Creation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run_discord:
        description: 'Post Discord notification only (no release artifact)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate Sound Files
        if: github.event.inputs.dry_run_discord != 'true'
        run: |
          # Ensure LFS files are real audio, not pointer stubs
          FIRST_MP3=$(find sounds/pack -name '*.mp3' -type f | head -1)
          if [ -z "$FIRST_MP3" ]; then
            echo "ERROR: No MP3 files found in sounds/pack/"
            exit 1
          fi
          SIZE=$(wc -c < "$FIRST_MP3")
          if [ "$SIZE" -lt 1000 ]; then
            echo "ERROR: $FIRST_MP3 is only ${SIZE} bytes — likely an LFS pointer, not audio"
            exit 1
          fi
          echo "OK: Sound files are real audio (first file: $FIRST_MP3, ${SIZE} bytes)"

      - name: Zip Module
        if: github.event.inputs.dry_run_discord != 'true'
        # Zips current directory, excluding git/github/dev files
        run: |
          zip -r module.zip . -x ".git/*" ".github/*" ".gitignore" "RELEASE_WORKFLOW.md" "task.md" "package.json" "package-lock.json" "node_modules/*" "scripts/utils/*" "scripts/debug_controls_structure.js" "debug_macro.js" "debug_pop.log" "audit_*.json" "audit_*.txt" "audit_*.js" "*.bak" "free_tier_candidates.md" "SETUP_GUIDE.md" "TEST_SCENARIOS.md" "docs/MIGRATION_STRATEGY.md" "docs/GUIDE.md"

      - name: Create Release
        if: github.event.inputs.dry_run_discord != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          make_latest: ${{ !(contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha')) }}

      - name: Notify Foundry VTT
        if: github.event.inputs.dry_run_discord != 'true' && success() && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
        uses: actions/github-script@v7
        env:
          FOUNDRY_TOKEN: ${{ secrets.FOUNDRY_PACKAGE_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('module.json', 'utf8'));

            const payload = {
              id: manifest.id,
              release: {
                version: manifest.version,
                manifest: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/latest/download/module.json`,
                notes: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${manifest.version}`,
                compatibility: manifest.compatibility
              }
            };

            console.log("Sending payload:", JSON.stringify(payload, null, 2));

            const response = await fetch("https://foundryvtt.com/_api/packages/release_version/", {
              method: "POST",
              headers: { 'Content-Type': 'application/json', 'Authorization': process.env.FOUNDRY_TOKEN },
              body: JSON.stringify(payload)
            });

            const text = await response.text();
            let data;
            try { data = JSON.parse(text); } catch { data = text; }
            console.log("Response:", typeof data === 'string' ? data : JSON.stringify(data, null, 2));

            if (!response.ok) {
              core.setFailed(`Foundry API Error (${response.status}): ${typeof data === 'string' ? data : JSON.stringify(data)}`);
            } else {
              console.log("Foundry VTT notified successfully.");
            }

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: build
    if: >
      success() &&
      !contains(github.ref_name, '-rc') &&
      !contains(github.ref_name, '-beta') &&
      !contains(github.ref_name, '-alpha')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');

            // Extract version from first ## heading
            const versionMatch = changelog.match(/^## \[([^\]]+)\]/m);
            const version = versionMatch ? versionMatch[1] : 'unknown';

            // Extract body between first and second ## headings
            const lines = changelog.split('\n');
            let body = [];
            let found = false;
            for (const line of lines) {
              if (line.startsWith('## ')) {
                if (found) break;
                found = true;
                continue;
              }
              if (found) {
                if (line.startsWith('### ')) {
                  body.push('', `**${line.slice(4)}**`);
                } else {
                  body.push(line);
                }
              }
            }
            let desc = body.join('\n').trim();
            if (desc.length > 3900) {
              desc = desc.slice(0, 3900) + '\n\n_...see full notes on GitHub_';
            }

            const repo = process.env.GITHUB_REPOSITORY;
            const tag = process.env.GITHUB_REF_NAME;
            const payload = {
              embeds: [{
                title: `🔊 Ionrift Resonance — v${version}`,
                description: desc,
                color: 0x4A9DD9,
                url: `https://github.com/${repo}/releases/tag/${tag}`,
                thumbnail: { url: `https://raw.githubusercontent.com/${repo}/main/assets/module-icon.png` }
              }]
            };

            const webhook = process.env.DISCORD_WEBHOOK;
            if (!webhook) {
              core.warning('DISCORD_WEBHOOK_URL secret is not set — skipping Discord notification');
              return;
            }

            const resp = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!resp.ok) {
              const text = await resp.text();
              core.setFailed(`Discord webhook failed (${resp.status}): ${text}`);
            } else {
              console.log('Discord notification posted successfully.');
            }
